sonar.projectKey=seo-mcp-hellobooks
sonar.projectName=hellobooks-mcp-public
sonar.sources=src
sonar.tests=test
sonar.test.inclusions=test/**/*.test.ts
sonar.exclusions=dist/**,node_modules/**,coverage/**,**/*.d.ts
sonar.sourceEncoding=UTF-8

# Coverage: LCOV produced by `npm run test:coverage` (c8 wrapping node --test).
# Run that script in CI BEFORE the SonarQube scanner step.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Data catalogs are intentionally row-heavy; the marketing source-of-truth
# refactor (factory functions + array .map) eliminates the bulk of duplication
# but doesn't change runtime shape — see PR #15.
sonar.cpd.exclusions=src/data/**
